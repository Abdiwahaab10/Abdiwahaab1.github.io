# The Site Configuration

# The language of the webpage
lang: en

# Change to your timezone › https://zones.arilyn.cc
timezone: Africa/Mogadishu

# jekyll-seo-tag settings
title: Abdiwahaab's Blog

tagline: Web Developer · Tech Enthusiast · Lifelong Learner

description: >-
  Personal blog by Abdiwahaab — sharing thoughts, ideas, tutorials, and stories about web development, technology, and everyday life.

url: "https://abdiwahaab10.github.io"

github:
  username: Abdiwahaab10

social:
  name: Abdiwahaab
  email: 
  links:
    - https://github.com/Abdiwahaab10

# Avatar for author bio
avatar: https://github.com/Abdiwahaab10.png

# LinkedIn profile URL (used in nav/footer)
linkedin_url: https://www.linkedin.com/in/abdiwahaab10

# Enable Table of Contents in posts by default
toc: true

# Pagination
paginate: 6
paginate_path: "/page/:num/"

# The base URL of your site
baseurl: "/Abdiwahaab1.github.io"

# Plugins
plugins:
  - jekyll-archives
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# ------------ The following options are not recommended to be modified ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      layout: post
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
