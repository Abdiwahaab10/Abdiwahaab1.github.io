<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="X-UA-Compatible" content="IE=edge">

{% if page.title %}
  <title>{{ page.title }} | {{ site.title }}</title>
{% else %}
  <title>{{ site.title }}{% if site.tagline %} — {{ site.tagline }}{% endif %}</title>
{% endif %}

{% if page.description %}
  <meta name="description" content="{{ page.description }}">
{% elsif site.description %}
  <meta name="description" content="{{ site.description }}">
{% endif %}

<!-- Prevent Flash of Wrong Theme -->
<script>
  (function() {
    try {
      var saved = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = saved ? saved : (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    } catch(e) {}
  })();
</script>

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

<!-- Main Stylesheet -->
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

<!-- SEO -->
{% seo %}

<!-- Favicon -->
<link rel="icon" type="image/png" href="{{ site.avatar }}">
<link rel="apple-touch-icon" href="{{ site.avatar }}">

<!-- Feed -->
<link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">

<!-- Open Graph / Twitter Card additional meta -->
{% if page.image.path %}
<meta property="og:image" content="{{ page.image.path }}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="{{ page.image.path }}">
{% endif %}
