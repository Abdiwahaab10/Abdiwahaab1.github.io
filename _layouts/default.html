<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}" data-theme="light">
<head>
  {% include head.html %}
</head>
<body>
  {% include header.html %}
  <main id="main-content" class="container">
    {{ content }}
  </main>
  {% include footer.html %}
  <button class="back-to-top" id="back-to-top" aria-label="Back to top" title="Back to top">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
  </button>
  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
